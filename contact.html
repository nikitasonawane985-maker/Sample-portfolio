<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Contact Us</title>
    <link rel="stylesheet" href="css/style.css" />
</head>

<body>

    <a href="#main-content" class="skip-link">
        Skip to main content
    </a>

    <header>
        <nav aria-label="Main Navigation">
            <ul>
                <li><a href="index.html">Home</a></li>
            </ul>
        </nav>
    </header>

    <main id="main-content">

        <section>

            <h1>Contact Us</h1>

            <p>
                Please fill out the form below.
                <strong>All fields are mandatory.</strong>
            </p>

            <form action="#" method="post">

                <div>
                    <label for="full-name">
                        Full Name
                    </label>

                    <input
                        type="text"
                        id="full-name"
                        name="full-name"
                        placeholder="John Doe"
                        autocomplete="name"
                        required
                    />
                </div>

                <br />

                <div>
                    <label for="email">
                        Email ID
                    </label>

                    <input
                        type="email"
                        id="email"
                        name="email"
                        placeholder="abc@gmail.com"
                        autocomplete="email"
                        required
                    />
                </div>

                <br />

                <div>
                    <label for="mobile-number">
                        Mobile Number
                    </label>

                    <input
                        type="tel"
                        id="mobile-number"
                        name="mobile-number"
                        placeholder="+91 9876543210"
                        autocomplete="tel"
                        required
                    />
                </div>

                <br />

                <div>
                    <label for="query">
                        Your Query
                    </label>

                    <textarea
                        id="query"
                        name="query"
                        rows="6"
                        placeholder="Please type your query here..."
                        autocomplete="off"
                        required
                    ></textarea>
                </div>

                <br />

                <button type="submit">
                    Submit
                </button>

            </form>

        </section>

    </main>

    <footer>
        <p>
            © 2026 Blog Website. All Rights Reserved.
        </p>
    </footer>

</body>
</html>
